<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Orbit · Demo Queue</title>
<meta name="description" content="Live client demos by Orbit — websites, chatbots, and 24/7 bilingual AI receptionists generated from one knowledge base.">
<style>
  :root{
    --bg:#0a0c12; --panel:#12151f; --line:#222838; --fg:#eef1f7; --muted:#9aa3b7;
    --accent:#6aa3ff; --accent2:#7ef0c2; --ink:#070910;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;background:var(--bg);color:var(--fg);
    font:16px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  a{color:var(--accent);text-decoration:none}
  .wrap{max-width:1040px;margin:0 auto;padding:0 20px}
  header{border-bottom:1px solid var(--line);background:rgba(10,12,18,.85);backdrop-filter:blur(8px);
    position:sticky;top:0;z-index:10}
  .nav{display:flex;align-items:center;gap:12px;height:60px}
  .brand{font-weight:800;letter-spacing:.04em;font-size:18px;margin-right:auto}
  .brand b{color:var(--accent)}
  .badge{font-size:12px;color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:4px 11px}
  .hero{padding:72px 0 40px;background:
    radial-gradient(1000px 420px at 80% -10%,rgba(106,163,255,.18),transparent 60%),
    radial-gradient(800px 380px at 5% 0%,rgba(126,240,194,.10),transparent 55%)}
  .hero h1{font-size:clamp(30px,5vw,48px);line-height:1.08;margin:0 0 14px;letter-spacing:-.01em}
  .hero p{font-size:clamp(16px,2.2vw,19px);color:var(--muted);max-width:620px;margin:0}
  section{padding:36px 0 64px}
  h2{font-size:20px;margin:0 0 18px;color:#cfd6e6}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
  .card{display:flex;flex-direction:column;background:var(--panel);border:1px solid var(--line);
    border-radius:16px;padding:20px;transition:border-color .2s,transform .2s}
  .card:hover{border-color:var(--accent);transform:translateY(-2px)}
  .card .tag{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--accent2);margin-bottom:10px}
  .card h3{margin:0 0 4px;font-size:19px}
  .card .meta{font-size:13px;color:var(--muted);margin:0 0 16px}
  .card .spacer{flex:1}
  .launch{display:inline-flex;align-items:center;gap:8px;align-self:flex-start;
    background:var(--accent);color:#08111f;font-weight:800;font-size:14px;padding:10px 16px;
    border-radius:10px;text-decoration:none}
  .launch:hover{filter:brightness(1.07)}
  .soon{align-self:flex-start;font-size:13px;color:var(--muted);border:1px dashed var(--line);
    border-radius:10px;padding:10px 16px}
  .empty{color:var(--muted);border:1px dashed var(--line);border-radius:14px;padding:22px;text-align:center}
  footer{border-top:1px solid var(--line);padding:30px 0;color:var(--muted);font-size:13px}
</style>
</head>
<body>

<header>
  <div class="wrap nav">
    <div class="brand">ORBIT <b>·</b> DEMO QUEUE</div>
    <span class="badge">Live client demos</span>
  </div>
</header>

<div class="hero">
  <div class="wrap">
    <h1>Client demos, ready to launch.</h1>
    <p>Each demo is a full website + chatbot + 24/7 bilingual AI receptionist, generated from one knowledge base. Pick one below to open it.</p>
  </div>
</div>

<section>
  <div class="wrap">
    <h2>Live demos</h2>
    <div class="grid" id="demoGrid"></div>
  </div>
</section>

<footer>
  <div class="wrap">© <span id="yr"></span> Orbit · Demo Queue — internal demo hub.</div>
</footer>

<script>
  /* ── Add one entry per demo. `path` is a subfolder in this repo.
        Set live:false to show a "Coming soon" card with no link. ── */
  const DEMOS = [
    { name:"Permanent Marx Tattoo Studio", city:"Salem, OR",
      tag:"Tattoo · Bilingual", path:"permanent-marx-tattoo/", live:true }
    // , { name:"Next Business", city:"City, ST", tag:"Vertical", path:"next-business/", live:true }
  ];

  document.getElementById('yr').textContent = new Date().getFullYear();
  const grid = document.getElementById('demoGrid');
  if(!DEMOS.length){
    grid.outerHTML = '<div class="empty">No demos yet — add one to the DEMOS array.</div>';
  } else {
    grid.innerHTML = DEMOS.map(function(d){
      var cta = d.live
        ? '<a class="launch" href="'+d.path+'">Launch demo &rarr;</a>'
        : '<span class="soon">Coming soon</span>';
      return '<div class="card">'+
        '<div class="tag">'+(d.tag||'Demo')+'</div>'+
        '<h3>'+d.name+'</h3>'+
        '<p class="meta">'+(d.city||'')+'</p>'+
        '<div class="spacer"></div>'+
        cta+
      '</div>';
    }).join('');
  }
</script>
</body>
</html>
